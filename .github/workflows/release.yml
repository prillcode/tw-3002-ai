name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          cd cli
          bun run build
          mv tw3002 tw3002-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tw3002-linux-x64
          path: cli/tw3002-linux-x64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          cd cli
          bun run build
          mv tw3002 tw3002-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tw3002-macos-arm64
          path: cli/tw3002-macos-arm64

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tw3002-linux-x64
          path: ./

      - uses: actions/download-artifact@v4
        with:
          name: tw3002-macos-arm64
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tw3002-linux-x64
            tw3002-macos-arm64
          generate_release_notes: true
