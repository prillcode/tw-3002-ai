name = "tw3002-api"
main = "src/index.ts"
compatibility_date = "2025-04-23"

[[d1_databases]]
binding = "DB"
database_name = "tw3002-galaxy"
database_id = "cf9e7fc7-22f8-4743-94bb-f3f014ba1b35"

[vars]
ENVIRONMENT = "development"
NPC_LLM_ENABLED = "true"
# Cloudflare Workers AI model for NPC decisions.
NPC_MODEL = "@cf/zai-org/glm-4.7-flash"
# Cloudflare Workers AI model for quote generation / main-screen flavor text.
NPC_QUOTE_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"

[ai]
binding = "AI"

# Secrets (set via `wrangler secret put` — NOT in this file)
# OPENROUTER_API_KEY
# DISCORD_WEBHOOK_URL
# ADMIN_SECRET

[triggers]
crons = ["*/5 * * * *"]
