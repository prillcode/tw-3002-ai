name = "tw3002-api"
main = "src/index.ts"
compatibility_date = "2025-04-23"

[[d1_databases]]
binding = "DB"
database_name = "tw3002-galaxy"
database_id = "cf9e7fc7-22f8-4743-94bb-f3f014ba1b35"

[vars]
ENVIRONMENT = "development"
# OpenRouter model for NPC brain decisions.
# Update this to use newer models as they become available.
# See https://openrouter.ai/models for current options.
NPC_MODEL = "openai/gpt-5.4-nano"

# Secrets (set via `wrangler secret put` — NOT in this file)
# OPENROUTER_API_KEY
# DISCORD_WEBHOOK_URL
# ADMIN_SECRET
