components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token from `/api/auth/verify`
    adminSecret:
      type: apiKey
      in: header
      name: X-Admin-Secret
      description: Admin secret key

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: Unauthorized }
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds until retry is allowed
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: 'Rate limit exceeded. Retry in 45s.' }
    ActionBudgetExceeded:
      description: Insufficient action points
      headers:
        X-ActionPoints-Remaining:
          schema: { type: integer }
        X-ActionPoints-NextRefill:
          schema: { type: integer }
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: 'Insufficient action points. Refills in 5 minutes.' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: 'Not found' }